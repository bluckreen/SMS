{% extends "base.html" %}
{% block title %}Issue Book{% endblock %}
{% block page_title %}Issue Book to Student{% endblock %}
{% block content %}
<div class="card" style="max-width:550px;">
  <div class="card-header"><i class="bi bi-book-fill me-2"></i>Issue Book</div>
  <div class="card-body p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Student <span class="text-danger">*</span></label>
        <select name="student_id" class="form-select" required>
          <option value="">-- Select Student --</option>
          {% for s in students %}<option value="{{ s.id }}">{{ s.full_name }} ({{ s.admission_number }})</option>{% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Book ID <span class="text-danger">*</span></label>
        <input type="text" name="book_id" class="form-control" placeholder="e.g. LIB-2024-001" required>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Issue Date <span class="text-danger">*</span></label>
          <input type="date" name="issue_date" class="form-control" value="{{ today }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Due Date <span class="text-danger">*</span></label>
          <input type="date" name="due_date" class="form-control" required>
        </div>
      </div>
      <div class="alert alert-info mb-3" style="font-size:.82rem;">
        <i class="bi bi-info-circle me-1"></i>Fine: ₹2 per day if overdue (auto-calculated on return).
      </div>
      <div class="d-flex justify-content-between">
        <a href="/library/" class="btn btn-outline-secondary">Cancel</a>
        <button type="submit" class="btn btn-navy">Issue Book</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
